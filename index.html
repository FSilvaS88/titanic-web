<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Titanic Escape V6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-card">
        <span class="hud-label">Distancia</span>
        <span class="hud-value"><span id="distance">0</span> m</span>
      </div>

      <div class="hud-card">
        <span class="hud-label">Esquivados</span>
        <span class="hud-value" id="dodged">0</span>
      </div>

      <div class="hud-card">
        <span class="hud-label">Nivel</span>
        <span class="hud-value" id="level">1</span>
      </div>

      <div class="hud-card record-card">
        <span class="hud-label">Récord</span>
        <span class="hud-value"><span id="bestScore">0</span> m</span>
      </div>
    </header>

    <section id="game">
      <div class="sky-glow"></div>
      <div class="ocean-overlay"></div>
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
      <div class="wave wave-3"></div>

      <div id="ship">
        <img src="assets/img/titanic.png" alt="Titanic" id="shipImage" />
      </div>

      <div id="startScreen" class="overlay show">
        <div class="panel">
          <h1>Titanic Escape</h1>
          <p>Esquiva los icebergs y avanza lo máximo posible.</p>
          <p class="small-text">Usa los botones o desliza el dedo sobre el juego.</p>
          <p class="best-text">Tu mejor marca: <span id="startBestScore">0</span> m</p>
          <button id="startBtn">Comenzar</button>
        </div>
      </div>

      <div id="gameOverScreen" class="overlay">
        <div class="panel">
          <h2>¡Colisión!</h2>
          <p>Distancia: <span id="finalDistance">0</span> m</p>
