<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Titanic Escape V4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-card">
        <span class="hud-label">Distancia</span>
        <span class="hud-value"><span id="distance">0</span> m</span>
      </div>

      <div class="hud-card">
        <span class="hud-label">Esquivados</span>
        <span class="hud-value" id="dodged">0</span>
      </div>

      <div class="hud-card">
        <span class="hud-label">Nivel</span>
        <span class="hud-value" id="level">1</span>
      </div>
    </header>

    <section id="game">
      <div class="ocean-overlay"></div>

      <div id="ship">
        <img src="assets/img/titanic.png" alt="Titanic" id="shipImage" />
      </div>

      <div id="startScreen" class="overlay show">
        <div class="panel">
          <h1>Titanic Escape</h1>
          <p>Esquiva los icebergs y avanza lo máximo posible.</p>
          <p class="small-text">Usa los botones o desliza el dedo sobre el juego.</p>
          <button id="startBtn">Comenzar</button>
        </div>
      </div>

      <div id="gameOverScreen" class="overlay">
        <div class="panel">
          <h2>¡Colisión!</h2>
          <p>Distancia: <span id="finalDistance">0</span> m</p>
          <p>Icebergs esquivados: <span id="finalDodged">0</span></p>
          <button id="restartBtn">Reiniciar</button>
        </div>
      </div>
    </section>

    <div class="controls">
      <button id="leftBtn" aria-label="Mover a la izquierda">
        <span>←</span>
      </button>

      <button id="rightBtn" aria-label="Mover a la derecha">
        <span>→</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
